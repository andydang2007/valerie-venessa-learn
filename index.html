<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Learning Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #f0fdf4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 35px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 600px; text-align: center; }
        .screen { display: none; }
        .btn { font-size: 20px; font-weight: bold; padding: 20px; border-radius: 15px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-subject { background: #3b82f6; color: white; width: 100%; margin-top: 20px; }
        .question-box { text-align: left; margin: 30px 0; }
        .q-text { font-size: 26px; font-weight: 500; line-height: 1.5; margin-bottom: 20px; }
        input.ans-input { font-size: 22px; padding: 15px; width: 100%; border: 2px solid #e5e7eb; border-radius: 12px; box-sizing: border-box; outline: none; }
        input.ans-input:focus { border-color: var(--primary); }
        .feedback { font-size: 20px; font-weight: bold; margin: 20px 0; min-height: 30px; }
        .controls { display: flex; gap: 10px; }
        .btn-action { flex: 1; background: #111827; color: white; padding: 15px; border-radius: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-screen" class="screen" style="display:block;">
        <p>Loading English Questions...</p>
    </div>

    <div id="menu-screen" class="screen">
        <h1>Valerie's Practice</h1>
        <div id="subject-list">
            </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="question-box">
            <div id="q-text" class="q-text"></div>
            <input type="text" id="ans-in" class="ans-input" placeholder="Type your answer here..." autocomplete="off">
        </div>
        <div id="fb-text" class="feedback"></div>
        <div class="controls">
            <button class="btn-action" onclick="location.reload()">Exit</button>
            <button class="btn-action" id="sub-btn" onclick="checkAnswer()">Submit</button>
            <button class="btn-action" id="next-btn" style="display:none;" onclick="location.reload()">Finish</button>
        </div>
    </div>
</div>

<script>
    // --- 请确保这里的 GID 是你 English 标签页的 ---
    const ENGLISH_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4/pub?gid=1893311738&single=true&output=csv";

    let questions = [];

    window.onload = function() {
        Papa.parse(ENGLISH_URL + "&t=" + Date.now(), {
            download: true,
            header: true,
            skipEmptyLines: 'greedy',
            complete: function(results) {
                questions = results.data.filter(r => r.Grade === 'P3');
                if (questions.length > 0) {
                    showMenu();
                } else {
                    document.getElementById('loading-screen').innerText = "No P3 English questions found.";
                }
            }
        });
    };

    function showMenu() {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'block';
        const list = document.getElementById('subject-list');
        list.innerHTML = `<button class="btn btn-subject">English (P3)</button>`;
        list.onclick = startQuiz;
    }

    function startQuiz() {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        const q = questions[0]; // 抓取第一题（你的填空题）
        document.getElementById('q-text').innerText = q.Question;
        
        // 绑定回车键
        document.getElementById('ans-in').addEventListener("keypress", (e) => {
            if(e.key === "Enter") checkAnswer();
        });
    }

    function checkAnswer() {
        const userAns = document.getElementById('ans-in').value.trim().toLowerCase();
        const correctAns = questions[0]['Correct Answer'].toString().trim().toLowerCase();
        const fb = document.getElementById('fb-text');

        if (userAns === correctAns) {
            fb.innerText = "✅ Excellent! It's correct.";
            fb.style.color = "#10b981";
        } else {
            fb.innerText = "❌ Not quite. Answer is: " + questions[0]['Correct Answer'];
            fb.style.color = "#ef4444";
        }
        
        document.getElementById('sub-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
        document.getElementById('ans-in').disabled = true;
    }
</script>
</body>
</html>
