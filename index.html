<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Learning Hub</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/learning.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LearningHub">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', 'Comic Sans MS', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 800px; background: rgba(255,255,255,0.95); padding: 30px 20px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; position: relative; border: 4px solid #ffffff; backdrop-filter: blur(10px); margin-top: 15px; }
        .screen { display: none; width: 100%; animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        
        /* 顶部日期块 */
        #school-term-display { 
            margin-bottom: 25px; font-size: 15px; color: #3b82f6; 
            background: rgba(255,255,255,0.8); padding: 10px 24px; 
            border-radius: 50px; font-weight: 900; border: 2px solid #fff; 
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.1); 
            display: inline-flex; align-items: center; gap: 10px;
        }

        /* 修复后的用户选择布局 */
        .name-selector { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px; 
            width: 100%;
            margin-top: 20px;
        }
        
        button.name-btn { 
            width: 100%; 
            max-width: 320px; 
            padding: 20px; 
            border-radius: 30px; 
            border: 4px solid #e2e8f0; 
            background: white; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 24px; 
            transition: 0.15s; 
            color: #475569; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            box-shadow: 0 8px 0 #cbd5e1; 
            outline: none; 
        }
        button.name-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        
        /* 网格卡片布局 */
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%; margin-bottom: 20px; }
        .grid-cards.three-col { grid-template-columns: repeat(3, 1fr); }
        
        .card-btn { background: white; border: 4px solid #e2e8f0; border-radius: 30px; padding: 25px 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.15s; color: #475569; font-weight: 900; font-size: 18px; box-shadow: 0 8px 0 #cbd5e1; }
        .card-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        .card-btn .emoji { font-size: 46px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        
        /* 通用动作按钮 */
        .btn-action { width: 100%; border-radius: 25px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; outline: none; padding: 18px; box-shadow: 0 6px 0 rgba(0,0,0,0.1); }
        .btn-action:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        /* 响应式调整：针对 iPad 横屏或更大屏幕 */
        @media (min-width: 600px) {
            .name-selector { flex-direction: row; justify-content: center; }
            .grid-cards { gap: 25px; }
            .container { padding: 40px 50px; }
        }

        /* 辅助样式保持一致 */
        .magic-number { display: inline-block; font-size: 1.4em; color: #f59e0b; font-weight: 900; padding: 0 5px; animation: popPulse 1s infinite alternate; }
        @keyframes popPulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px; max-height: 400px; overflow-y: auto; }
        .res-section { border-top: 4px dashed #e2e8f0; margin-top: 30px; padding-top: 25px; text-align: left; }
        .res-card { background: #f1f5f9; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 2px solid #e2e8f0; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 40px; border-radius: 40px; text-align: center; width: 90%; max-width: 400px; border: 5px solid #fff; }
        .pin-input-hub { font-size: 40px; font-weight: 900; letter-spacing: 12px; padding: 15px; width: 180px; text-align: center; border: 4px solid #e2e8f0; border-radius: 25px; margin: 20px 0; outline: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .error-shake { border-color: #ef4444 !important; animation: shake 0.3s; background-color: #fef2f2; }
    </style>
</head>
<body>

<div class="container">
    <div id="school-term-display">📅 Loading...</div>

    <div id="loading" class="screen" style="display:block; padding: 50px 0; font-size: 24px; color: #3b82f6; font-weight: 900;">
        🌟 魔法书正在加载...
    </div>

    <div id="user-screen" class="screen">
        <h2 style="margin:0; color:#0f172a; font-size: 32px; font-weight: 900;">Did you <span class="magic-number">6~7</span> today?</h2>
        <p style="font-size: 16px; color: #64748b; margin: 10px 0 30px 0; font-weight: 800;">Aim for perfection!</p>

        <div class="name-selector">
            <button class="name-btn" onclick="switchUser('P3')">
                <span style="font-size: 46px;">👱‍♀️</span> Valerie
            </button>
            <button class="name-btn" onclick="switchUser('P1')">
                <span style="font-size: 46px;">👧</span> Venessa
            </button>
        </div>
    </div>

    <div id="subject-screen" class="screen">
        <h2 id="welcome-title" style="margin-bottom:30px; color:#0f172a; font-size: 32px; font-weight: 900;">Welcome!</h2>
        <div class="grid-cards">
            <div class="card-btn" style="border-color:#bae6fd;" onclick="handleSubjectClick('English')"><div class="emoji">🔤</div> English</div>
            <div class="card-btn" style="border-color:#fbcfe8;" onclick="handleSubjectClick('Math')"><div class="emoji">🔢</div> Math</div>
            <div class="card-btn" id="cn-subject-btn" style="border-color:#e9d5ff;" onclick="handleSubjectClick('华文')"><div class="emoji">🐼</div> 华文</div>
            <div class="card-btn" style="border-color:#a7f3d0;" onclick="handleSubjectClick('Science')"><div class="emoji">🌱</div> Science</div>
        </div>

        <div class="res-section">
            <h3 style="margin-top:0; color:#334155; font-size: 22px; font-weight: 900;">📚 Resources</h3>
            <div id="res-list"></div>
        </div>
        
        <div style="margin-top: 30px; display: flex; justify-content: center;">
            <button class="btn-action" style="max-width: 400px; background:#f1f5f9; color:#64748b; border:4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1;" onclick="showScreen('user-screen')">← Switch User</button>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <h2 style="margin-bottom:30px; font-size: 28px; font-weight: 900;">Select Mode</h2>
        <div class="grid-cards">
            <div class="card-btn" style="border-color:#bae6fd; color:#0284c7;" onclick="showTopicSelection(curSub, false)"><div class="emoji">🚀</div> Practice</div>
            <div class="card-btn" style="border-color:#fde68a; color:#b45309;" onclick="showTopicSelection(curSub, true)"><div class="emoji">✍️</div> Spelling</div>
        </div>
        <button class="btn-action" style="background:#f1f5f9; color:#64748b; border:4px solid #e2e8f0; margin-top: 15px;" onclick="showScreen('subject-screen')">← Back</button>
    </div>

    <div id="cn-mode-screen" class="screen">
        <h2 style="margin-bottom:30px; font-size: 28px; font-weight: 900;">要做什么练习？</h2>
        <div class="grid-cards three-col">
            <div class="card-btn" onclick="showTopicSelection('华文', false)"><div class="emoji">📝</div> 复习</div>
            <div class="card-btn" onclick="goToSpelling()"><div class="emoji">✍️</div> 听写</div>
            <div class="card-btn" onclick="goToPinyinGame()"><div class="emoji">🎮</div> 拼音</div>
        </div>
        <button class="btn-action" style="background:#f1f5f9; color:#64748b; border:4px solid #e2e8f0; margin-top: 25px;" onclick="showScreen('subject-screen')">← 返回</button>
    </div>

    </div>

<div id="pin-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin:0; font-size: 26px; font-weight: 900;">Parent Lock 🛡️</h3>
        <input type="tel" id="hub-pin-input" class="pin-input-hub" maxlength="4" placeholder="***">
        <div style="display:flex; gap:15px; width: 100%;">
            <button class="btn-action" style="background:#f1f5f9; flex:1;" onclick="closePinModal()">Cancel</button>
            <button class="btn-action" style="background:#f59e0b; color:white; flex:1;" onclick="verifyHubPin()">Unlock</button>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = "1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4";
    const GIDS = { "English": "1893311738", "Math": "59294467", "Science": "1581471994", "华文": "2020673087", "Resources": "469231602" };
    let db = {}, curUser = '', curSub = '', pendingUser = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    async function init() {
        // 日期逻辑
        const now = new Date();
        const t2 = new Date(2026, 2, 23), t3 = new Date(2026, 5, 29), t4 = new Date(2026, 8, 14);
        const diff = (d1, d2) => Math.floor((d1 - d2) / 864e5);
        let term = "Term 1";
        if (now >= t4) { const w = Math.floor(diff(now, t4)/7) + 1; term = w <= 10 ? `T4 Wk ${w}` : "Holiday"; }
        else if (now >= t3) { const w = Math.floor(diff(now, t3)/7) + 1; term = w <= 10 ? `T3 Wk ${w}` : "Holiday"; }
        else if (now >= t2) { const w = Math.floor(diff(now, t2)/7) + 1; term = w <= 10 ? `T2 Wk ${w}` : "Holiday"; }
        document.getElementById('school-term-display').innerHTML = `<span>📅 ${now.toLocaleDateString('en-SG', {month:'short', day:'numeric'})}</span><span style="color:#cbd5e1">|</span><span>${term}</span>`;

        let cached = sessionStorage.getItem('hub_db_cache');
        if (cached) { db = JSON.parse(cached); document.getElementById('loading').style.display='none'; showScreen('user-screen'); return; }

        const loads = Object.entries(GIDS).map(([name, gid]) => new Promise(res => {
            Papa.parse(`https://docs.google.com/spreadsheets/d/e/2PACX-${SHEET_ID}/pub?gid=${gid}&single=true&output=csv&t=${Date.now()}`, {
                download: true, header: true, skipEmptyLines: 'greedy',
                complete: r => res({ name, data: r.data }),
                error: () => res(null)
            });
        }));
        const results = await Promise.all(loads);
        results.forEach(r => { if(r) r.data.forEach(row => { 
            let g = (row.Grade || "").toUpperCase(); if(!g) return;
            if(!db[g]) db[g] = {}; if(!db[g][r.name]) db[g][r.name] = []; db[g][r.name].push(row);
        }); });
        sessionStorage.setItem('hub_db_cache', JSON.stringify(db));
        document.getElementById('loading').style.display='none';
        showScreen('user-screen');
    }

    function switchUser(g) {
        if (g === 'P1') { pendingUser = g; document.getElementById('pin-modal').style.display = 'flex'; return; }
        executeSwitchUser(g);
    }

    function executeSwitchUser(g) {
        curUser = g;
        document.getElementById('welcome-title').innerText = `Welcome, ${g==='P3'?'Valerie':'Venessa'}!`;
        const list = document.getElementById('res-list'); list.innerHTML = '';
        if(db[g] && db[g]['Resources']) db[g]['Resources'].forEach(r => {
            const div = document.createElement('div'); div.className = 'res-card';
            div.innerHTML = `<b>${r.Title}</b>` + (r.Type === 'IMAGE' ? `<img src="${r.Content}" style="width:100%;margin-top:10px;border-radius:10px;">` : `<p>${r.Content}</p>`);
            list.appendChild(div);
        });
        showScreen('subject-screen');
    }

    function verifyHubPin() {
        const input = document.getElementById('hub-pin-input').value;
        const now = new Date();
        const mmdd = (now.getMonth() + 1) * 100 + now.getDate();
        const day = now.getDay() === 0 ? 7 : now.getDay();
        if (input === (mmdd + day).toString()) {
            document.getElementById('pin-modal').style.display = 'none';
            executeSwitchUser(pendingUser);
        } else {
            document.getElementById('hub-pin-input').classList.add('error-shake');
            setTimeout(() => { document.getElementById('hub-pin-input').classList.remove('error-shake'); document.getElementById('hub-pin-input').value = ''; }, 400);
        }
    }
    
    function closePinModal() { document.getElementById('pin-modal').style.display = 'none'; }
    function handleSubjectClick(s) { curSub = s; if (s === '华文') showScreen('cn-mode-screen'); else showScreen('mode-screen'); }
    function goToPinyinGame() { window.location.href = "pinyin.html"; }
    function goToSpelling() { window.location.href = "spelling.html"; }

    init();
</script>
</body>
</html>
