<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Practice Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 850px; background: rgba(255,255,255,0.95); padding: 30px 20px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; position: relative; border: 4px solid #ffffff; backdrop-filter: blur(12px); margin-top: 5vh; }
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .header-tag { background: #f8fafc; color: #3b82f6; padding: 10px 25px; border-radius: 30px; font-weight: 900; font-size: 18px; border: 3px solid #e2e8f0; margin-bottom: 20px; }
        .milestone-track { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; width: 100%; margin-bottom: 10px; }
        .milestone { width: 28px; height: 28px; background: #f8fafc; border: 3px solid #cbd5e1; border-radius: 50%; font-size: 12px; transition: 0.4s; display: flex; align-items: center; justify-content: center; }
        .milestone.done { border-color: #10b981; background: #d1fae5; }
        .milestone.active { border-color: #3b82f6; background: #eff6ff; transform: scale(1.2); animation: bounceActive 1s infinite alternate; }
        @keyframes bounceActive { 0% { transform: translateY(0); } 100% { transform: translateY(-3px); } }
        .q-text { font-size: 26px; text-align: left; margin: 15px 0 25px 0; line-height: 1.5; font-weight: 800; }
        input.ans-input, textarea.ans-input { font-size: 22px; padding: 18px; width: 100%; border: 4px solid #e2e8f0; border-radius: 20px; outline: none; font-weight: bold; }
        .mcq-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        button.mcq-btn { padding: 18px; border-radius: 20px; border: 4px solid #e2e8f0; background: white; font-size: 20px; font-weight: 700; cursor: pointer; text-align: left; box-shadow: 0 5px 0 #cbd5e1; }
        button.mcq-btn.active { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; box-shadow: 0 5px 0 #93c5fd; }
        .btn-action { width: 100%; border-radius: 25px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; padding: 20px; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .epic-modal { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); padding: 40px; border-radius: 40px; text-align: center; width: 90%; max-width: 450px; border: 6px solid #fde68a; position: relative; }
        .epic-icon { font-size: 80px; margin-top: -80px; background: white; width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 6px solid #fde68a; margin-bottom: 20px; }
        @media (min-width: 768px) { .milestone-track { flex-direction: column; width: 40px; min-height: 500px; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="screen" style="display:flex;">🌟 魔法书载入中...</div>
    <div id="quiz-screen" class="screen">
        <div class="header-tag" id="header-info">🚀 Practice</div>
        <div id="progress-bar" class="milestone-track"></div>
        <div id="q-text" class="q-text"></div>
        <div id="input-container" style="width: 100%;"></div>
        <div id="fb-text" style="font-weight:900; font-size:20px; margin: 15px 0;"></div>
        <div style="display:flex; gap:15px; width: 100%;">
            <button id="exit-btn" class="btn-action" style="background:#f1f5f9; color:#64748b; flex:1;" onclick="window.location.href='index.html'">Quit 🏠</button>
            <button id="sub-btn" class="btn-action" style="background:#3b82f6; color:white; flex:1.2;" onclick="checkAns()">Submit</button>
            <button id="next-btn" class="btn-action" style="background:#10b981; color:white; flex:1.2; display:none;" onclick="nextQ()">Next ➡️</button>
        </div>
    </div>
    <div id="finish-screen" class="screen"></div>
</div>

<div id="badge-modal" class="modal-overlay">
    <div class="epic-modal">
        <div class="epic-icon" id="badge-icon">⚡️</div>
        <h2 id="badge-title">新成就！</h2>
        <p id="badge-desc" style="font-weight:800; color:#92400e;"></p>
        <button class="btn-action" style="background:#f59e0b; color:white;" onclick="closeBadgeModal()">继续 🚀</button>
    </div>
</div>

<script>
    const SYNC_API_URL = "https://script.google.com/macros/s/AKfycbyNi-a8VpHLrIpd0x5Fnb_825ZzFrLp4h2oMKot3xefrLGiLe3Pj-d8L-xWQh5w-Kkd/exec";
    const SHEET_ID = "1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4";
    const GIDS = { "English": "1893311738", "Math": "59294467", "Science": "1581471994", "华文": "2020673087" };
    
    let db = {}, sessionQs = [], curIdx = 0, sessionErrors = 0, startTime = 0;
    let curUser = localStorage.getItem('currentPlayer') || 'P3';
    let curSub = localStorage.getItem('currentSubject') || 'English';
    let badgeQueue = [];

    async function syncToCloud(payload) {
        try { fetch(SYNC_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); } catch (e) {}
    }

    async function init() {
        // 🛡️ 每日体力限制 (1次/科)
        const today = new Date().toISOString().split('T')[0];
        const limitKey = `limit_${today}_${curUser}_${curSub}`;
        if (parseInt(localStorage.getItem(limitKey) || "0") >= 1) {
            document.getElementById('loading').innerHTML = `<h2 style="padding:40px;">今日【${curSub}】已经达标啦！明天再来挑战吧！🏆</h2><button onclick="location.href='index.html'" class="btn-action">返回主页</button>`;
            return;
        }

        const loads = Object.entries(GIDS).map(([name, gid]) => new Promise(res => {
            Papa.parse(`https://docs.google.com/spreadsheets/d/e/2PACX-${SHEET_ID}/pub?gid=${gid}&single=true&output=csv`, {
                download: true, header: true, complete: r => res({ name, data: r.data })
            });
        }));
        const results = await Promise.all(loads);
        results.forEach(r => { db[r.name] = r.data; });
        startQuiz(limitKey);
    }

    function startQuiz(limitKey) {
        localStorage.setItem(limitKey, "1"); // 消耗体力
        let pool = (db[curSub] || []).filter(q => (q.Grade || "").toUpperCase() === curUser);
        sessionQs = pool.sort(() => 0.5 - Math.random()).slice(0, 15);
        startTime = Date.now();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'flex';
        renderQ();
    }

    function renderQ() {
        const q = sessionQs[curIdx];
        document.getElementById('progress-bar').innerHTML = sessionQs.map((_, i) => `<div class="milestone ${i < curIdx ? 'done' : (i === curIdx ? 'active' : '')}"></div>`).join('');
        document.getElementById('q-text').innerText = q.Question;
        const container = document.getElementById('input-container');
        if (q.Type === 'MCQ') {
            const opts = (q.Options || "").split('/').filter(o => o);
            container.innerHTML = `<div class="mcq-list">${opts.map(o => `<button class="mcq-btn" onclick="selMCQ(this, '${o}')">${o}</button>`).join('')}</div><input type="hidden" id="ans-in">`;
        } else {
            container.innerHTML = `<input type="text" id="ans-in" class="ans-input" placeholder="输入答案...">`;
        }
        document.getElementById('fb-text').innerText = '';
        document.getElementById('sub-btn').style.display = 'flex';
        document.getElementById('next-btn').style.display = 'none';
    }

    function selMCQ(btn, val) {
        document.querySelectorAll('.mcq-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); document.getElementById('ans-in').value = val;
    }

    function checkAns() {
        const user = document.getElementById('ans-in').value.trim().toLowerCase();
        const correct = (sessionQs[curIdx]['Correct Answer'] || "").trim().toLowerCase();
        const fb = document.getElementById('fb-text');
        if (!user) return;
        if (user === correct) {
            fb.innerHTML = "✅ 正确！"; fb.style.color = "#10b981";
            document.getElementById('sub-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'flex';
        } else {
            sessionErrors++;
            fb.innerHTML = `❌ 不对，答案是: ${correct}`; fb.style.color = "#ef4444";
            document.getElementById('sub-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'flex';
        }
    }

    function nextQ() { curIdx < sessionQs.length - 1 ? (curIdx++, renderQ()) : finishQuiz(); }

    function finishQuiz() {
        const timeTaken = Math.floor((Date.now() - startTime) / 1000);
        const limit = curUser === 'P3' ? 180 : 360;
        let badges = 0;
        badgeQueue = [];

        // 判定徽章
        if (sessionErrors <= 3) {
            badges++;
            badgeQueue.push({ icon: '🎓', title: '科目大师', desc: '练习完成！' });
        }
        if (sessionErrors <= 1) {
            badges++;
            badgeQueue.push({ icon: '🎯', title: '神射手', desc: '几乎没有错题！' });
            if (timeTaken <= limit) {
                badges++;
                badgeQueue.push({ icon: '⚡️', title: '极速突破', desc: '速度像闪电一样快！' });
            }
        }

        // 💰 计算金库金币 (P3=1, P1=2倍)
        let coinGain = badges * (curUser === 'P1' ? 2 : 1);
        let vault = parseInt(localStorage.getItem('gold_coins_vault') || "0");
        localStorage.setItem('gold_coins_vault', vault + coinGain);

        // 💎 计算打卡水晶 (连续第3天起，每天1个)
        let today = new Date().toISOString().split('T')[0];
        let lastDate = localStorage.getItem(`last_date_${curUser}`);
        let streak = parseInt(localStorage.getItem(`streak_${curUser}`) || "0");

        if (lastDate) {
            let diff = (new Date(today) - new Date(lastDate)) / 864e5;
            if (diff === 1) streak++; else if (diff > 1) streak = 1;
        } else streak = 1;

        localStorage.setItem(`last_date_${curUser}`, today);
        localStorage.setItem(`streak_${curUser}`, streak);

        if (streak >= 3) {
            let crys = parseInt(localStorage.getItem(`crystals_${curUser}`) || "0");
            localStorage.setItem(`crystals_${curUser}`, crys + 1);
            badgeQueue.push({ icon: '💎', title: '毅力水晶', desc: '连续练习第' + streak + '天，获得水晶！' });
            syncToCloud({ type: 'crystal_update', user: curUser, amount: 1 });
        }

        syncToCloud({ type: 'coin_update', user: curUser, amount: coinGain, total: vault + coinGain });
        showBadgeModal();
    }

    function showBadgeModal() {
        if (badgeQueue.length > 0) {
            let b = badgeQueue.shift();
            document.getElementById('badge-icon').innerText = b.icon;
            document.getElementById('badge-title').innerText = b.title;
            document.getElementById('badge-desc').innerText = b.desc;
            document.getElementById('badge-modal').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            location.href = 'index.html';
        }
    }
    function closeBadgeModal() { document.getElementById('badge-modal').style.display = 'none'; showBadgeModal(); }
    window.onload = init;
</script>
</body>
</html>
