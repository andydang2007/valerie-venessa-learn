<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Spelling</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M04YCD1PQK"></script>
    <script>
    let currentPlayer = localStorage.getItem('currentPlayer') || 'P3'; 
    // 强制锁定为 English
    let currentSubject = 'English'; 
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --text-main: #1e293b; --text-muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 15px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; overflow: hidden; }
        
        .container { width: 100%; max-width: 750px; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; margin: auto; position: relative; border: 4px solid #ffffff; backdrop-filter: blur(10px); display: flex; flex-direction: column; max-height: 96dvh; }
        
        .screen { display: none; flex: 1; flex-direction: column; width: 100%; overflow: hidden; animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        #finish-screen { justify-content: center; overflow-y: auto; }
        
        h1 { color: #3b82f6; margin-top: 0; font-size: 32px; margin-bottom: 25px; font-weight: 900; text-shadow: 2px 2px 0px #dbeafe; flex: none; }

        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 10px; padding: 10px; flex: 1; overflow-y: auto; align-content: flex-start; }
        .topic-cb { padding: 14px 22px; border-radius: 30px; border: 3px solid #e2e8f0; background: white; cursor: pointer; transition: 0.15s; font-size: 16px; font-weight: 900; color: #475569; user-select: none; box-shadow: 0 5px 0 #cbd5e1; display: flex; align-items: center; }
        .topic-cb:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
        .topic-cb.selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; box-shadow: 0 5px 0 #93c5fd; }
        
        .action-panel { display: flex; gap: 15px; margin-top: 10px; padding-bottom: 20px; width: 100%; flex: none; }
        .btn-square { flex: 0 0 120px; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f1f5f9; border: 3px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; cursor: pointer; transition: 0.15s; }
        .btn-square:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
        .btn-stacked { flex: 1; border-radius: 25px; font-size: 22px; font-weight: 900; border: none; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; color: white; background: #10b981; box-shadow: 0 6px 0 #059669; }
        .btn-stacked:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        .progress-container { width: 100%; background: #f1f5f9; height: 18px; border-radius: 10px; margin-bottom: 15px; border: 3px solid #e2e8f0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #38bdf8, #3b82f6); width: 0%; transition: 0.4s; border-radius: 10px; }
        .progress-text { font-size: 20px; color: #94a3b8; margin-bottom: 20px; font-weight: 900; }

        /* 英文听写专属 UI */
        .practice-main { display: flex; flex-direction: column; flex: 1; width: 100%; align-items: center; justify-content: center; gap: 20px; }
        
        .audio-btn { font-size: 40px; background: #eff6ff; color: #3b82f6; border: 4px solid #bfdbfe; width: 100px; height: 100px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 8px 0 #93c5fd; transition: 0.1s; outline: none; margin: 0 auto; }
        .audio-btn:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }

        .spell-input { width: 100%; max-width: 400px; font-size: 46px; text-align: center; font-weight: 900; letter-spacing: 5px; padding: 20px; border-radius: 25px; border: 5px solid #e2e8f0; color: #1e293b; outline: none; transition: 0.2s; box-shadow: inset 0 4px 10px rgba(0,0,0,0.05); font-family: monospace; text-transform: lowercase; }
        .spell-input:focus { border-color: #3b82f6; background: #f8fafc; }
        .spell-input.correct { border-color: #10b981; color: #10b981; background: #ecfdf5; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .spell-input.error-shake { border-color: #ef4444; color: #ef4444; background: #fef2f2; animation: shake 0.3s; }

        .hint-btn { background: #fffbeb; color: #d97706; border: 3px solid #fde68a; padding: 10px 20px; border-radius: 20px; font-weight: 900; font-size: 16px; cursor: pointer; box-shadow: 0 5px 0 #fcd34d; transition: 0.15s; }
        .hint-btn:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        .letter-pool { display: none; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; max-width: 400px; margin-top: 15px; }
        .letter-btn { width: 60px; height: 70px; border-radius: 15px; border: 3px solid #cbd5e1; background: white; font-size: 32px; font-weight: 900; color: #334155; cursor: pointer; box-shadow: 0 5px 0 #94a3b8; transition: 0.1s; display: flex; align-items: center; justify-content: center; text-transform: lowercase; }
        .letter-btn:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
        .letter-btn:disabled { opacity: 0.3; pointer-events: none; transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        .controls-row { display: flex; gap: 16px; width: 100%; height: 75px; flex: none; margin-top: auto; }
        .btn-action { border-radius: 22px; border: none; font-weight: 900; font-size: 22px; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; outline: none; }
        .btn-quit { flex: 1; background: #f1f5f9; color: #64748b; border: 3px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1; } 
        .btn-nav { flex: 2; background: #3b82f6; color: white; box-shadow: 0 6px 0 #2563eb; } 
        .btn-nav:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        @media (min-width: 768px) {
            .container { max-width: 900px; padding: 40px; height: 90dvh; border-radius: 50px;}
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="screen" style="display:flex; justify-content:center; align-items:center; padding: 60px 0; font-size: 24px; font-weight: 900; color: #3b82f6;">
        🌟 魔法书正在加载... 
    </div>

    <div id="topic-screen" class="screen">
        <h1 id="topic-header">📝 English Spelling</h1>
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="check-all-btn" class="topic-cb" style="display:inline-flex; padding: 14px 22px; justify-content: center;" onclick="toggleAllTopics(this)">
                🌟 Select All
            </div>
        </div>
        <div id="topic-list" class="checkbox-grid"></div>
        <div class="action-panel">
            <button class="btn-square" onclick="window.location.href='index.html'">
                <span style="font-size: 40px;">🏠</span>
            </button>
            <button class="btn-stacked" onclick="startPractice()">Start 🚀</button>
        </div>
    </div>

    <div id="practice-screen" class="screen">
        <div class="progress-container"><div id="prog-bar" class="progress-bar"></div></div>
        <div id="prog-text" class="progress-text">1 / 10</div>
        
        <div class="practice-main">
            <button class="audio-btn" onclick="playCurrentWord()">🔊</button>
            <div id="english-hint" style="color: #64748b; font-size: 20px; font-weight: 800; min-height: 30px;"></div>

            <input type="text" id="spell-input" class="spell-input" autocomplete="off" spellcheck="false" placeholder="type here">
            
            <button id="hint-btn" class="hint-btn" onclick="showScrambledHint()">💡 Give me a hint</button>
            <div id="letter-pool" class="letter-pool"></div>
        </div>

        <div class="controls-row">
            <button id="quit-btn" class="btn-action btn-quit" onclick="window.location.href='index.html'">Quit 🏠</button>
            <button id="sub-btn" class="btn-action btn-nav" onclick="checkSpelling()">Submit</button>
            <button id="next-btn" class="btn-action btn-nav" style="background:#10b981; box-shadow: 0 6px 0 #059669; display:none;" onclick="nextQuestion()">Next ➡️</button>
        </div>
    </div>

    <div id="finish-screen" class="screen"></div>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAq-_y8eYBv2Mv7_TrW1Q4ffAlLb48tJIXfDzeT8KQKXKowlG_Hvh6TH380RHLL-OTKIypPwNVw0NX/pub?gid=0&single=true&output=csv";
    const LIMIT = 5; 

    let db = [], practiceList = [], curIdx = 0, sessionErrors = 0;
    let totalCorrectCount = 0, currentWrongItems = [];
    let isRetrySession = false;

    // 语音合成配置
    const synth = window.speechSynthesis;
    let englishVoice = null;

    function initVoice() {
        const voices = synth.getVoices();
        englishVoice = voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('en')) || voices[0];
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoice;

    function playCurrentWord() {
        if (synth.speaking) synth.cancel();
        const word = practiceList[curIdx].Answer;
        const u = new SpeechSynthesisUtterance(word);
        if (englishVoice) u.voice = englishVoice;
        u.lang = 'en-US'; u.rate = 0.8;
        synth.speak(u);
    }

    function checkAndIncrementLimit(lessons) {
        const today = new Date().toISOString().split('T')[0];
        const storageKey = `eng_spelling_usage_${today}`;
        let usage = JSON.parse(localStorage.getItem(storageKey) || "{}");

        for (let lesson of lessons) {
            if (!usage[lesson]) usage[lesson] = 0;
            if (usage[lesson] >= LIMIT) {
                alert(`You have practiced [${lesson}] enough today! Take a break.`);
                return false;
            }
        }
        lessons.forEach(l => usage[l]++);
        localStorage.setItem(storageKey, JSON.stringify(usage));
        return true;
    }

    function init() {
        let childName = currentPlayer === 'P1' ? 'Venessa' : 'Valerie';
        document.getElementById('topic-header').innerText = `📝 ${childName}'s Spelling`;

        Papa.parse(SHEET_URL + "&t=" + Date.now(), {
            download: true, header: true, skipEmptyLines: 'greedy',
            transformHeader: h => h.replace(/^\uFEFF/, '').trim().toUpperCase(),
            complete: function(results) {
                let pool = [];
                results.data.forEach((row, index) => { 
                    let g = (row['GRADE'] || "").toUpperCase();
                    let sub = (row['SUBJECT'] || "").trim();
                    let type = (row['TYPE'] || "").toUpperCase().trim();
                    
                    // 只提取当前用户，科目为英文，且类型包含 SPELLING 的行
                    if (g === currentPlayer && sub === 'English' && type === 'SPELLING') {
                        pool.push({
                            Topic: row['TOPIC'] || row['LESSON'] || "Default",
                            Hint: row['QUESTION'] || row['HINT'] || "",
                            Answer: (row['CORRECT ANSWER'] || row['ANSWER'] || "").trim(),
                            originalIndex: index,
                            isWrong: false
                        });
                    }
                });
                
                db = pool;
                document.getElementById('loading').style.display = 'none';

                if (db.length === 0) {
                    alert("No English spelling words found for your profile.");
                    window.location.href = "index.html";
                    return;
                }
                loadTopics();
            }
        });
    }

    function loadTopics() {
        let topics = [...new Set(db.map(q => q.Topic))].sort();
        const list = document.getElementById('topic-list'); list.innerHTML = '';
        
        topics.forEach(t => {
            const label = document.createElement('div'); 
            label.className = 'topic-cb';
            label.innerText = t;
            label.dataset.val = t;
            label.onclick = function() { 
                this.classList.toggle('selected'); 
                syncCheckAll(); 
            };
            list.appendChild(label);
        });
        showScreen('topic-screen');
    }

    function toggleAllTopics(masterBtn) {
        let isSelecting = !masterBtn.classList.contains('selected');
        if (isSelecting) {
            masterBtn.classList.add('selected'); masterBtn.innerHTML = '🌟 Deselect All';
            document.querySelectorAll('.topic-cb:not(#check-all-btn)').forEach(cb => cb.classList.add('selected'));
        } else {
            masterBtn.classList.remove('selected'); masterBtn.innerHTML = '🌟 Select All';
            document.querySelectorAll('.topic-cb:not(#check-all-btn)').forEach(cb => cb.classList.remove('selected'));
        }
    }

    function syncCheckAll() {
        const allItems = Array.from(document.querySelectorAll('.topic-cb:not(#check-all-btn)'));
        const allChecked = allItems.every(cb => cb.classList.contains('selected'));
        const master = document.getElementById('check-all-btn');
        if (allChecked) { master.classList.add('selected'); master.innerHTML = '🌟 Deselect All'; } 
        else { master.classList.remove('selected'); master.innerHTML = '🌟 Select All'; }
    }

    function startPractice() {
        let sel = Array.from(document.querySelectorAll('.topic-cb.selected:not(#check-all-btn)')).map(cb => cb.dataset.val);
        if(sel.length === 0) return;

        if (!checkAndIncrementLimit(sel)) return;

        isRetrySession = false;
        
        let pool = db.filter(q => sel.includes(q.Topic));
        // 打乱题目顺序
        practiceList = pool.sort(() => 0.5 - Math.random());
        practiceList.forEach(q => q.isWrong = false);
        
        curIdx = 0; totalCorrectCount = 0; sessionErrors = 0;
        
        // 关键：触发一次无声音的TTS以解锁iOS语音限制
        initVoice();
        let silentUtterance = new SpeechSynthesisUtterance('');
        synth.speak(silentUtterance);

        showScreen('practice-screen'); 
        renderQuestion();
    }

    function renderQuestion() {
        const q = practiceList[curIdx];
        document.getElementById('prog-bar').style.width = `${((curIdx) / practiceList.length) * 100}%`;
        document.getElementById('prog-text').innerText = `${curIdx + 1} / ${practiceList.length}`;
        
        document.getElementById('english-hint').innerText = q.Hint;
        
        const input = document.getElementById('spell-input');
        input.value = '';
        input.className = 'spell-input';
        input.disabled = false;
        
        document.getElementById('hint-btn').style.display = 'block';
        document.getElementById('letter-pool').style.display = 'none';
        
        document.getElementById('sub-btn').style.display = 'flex'; 
        document.getElementById('next-btn').style.display = 'none';

        setTimeout(() => {
            playCurrentWord();
            input.focus();
        }, 300);
    }

    function showScrambledHint() {
        document.getElementById('hint-btn').style.display = 'none';
        const pool = document.getElementById('letter-pool');
        pool.style.display = 'flex';
        
        const answer = practiceList[curIdx].Answer.toLowerCase();
        let letters = answer.split('');
        const alphabet = "abcdefghijklmnopqrstuvwxyz";
        // 混入2个随机干扰字母
        letters.push(alphabet[Math.floor(Math.random()*26)]);
        letters.push(alphabet[Math.floor(Math.random()*26)]);
        letters.sort(() => 0.5 - Math.random());
        
        pool.innerHTML = letters.map((l, i) => `<button id="btn-ltr-${i}" class="letter-btn" onclick="typeLetter('${l}', this)">${l}</button>`).join('');
    }

    function typeLetter(char, btn) {
        const input = document.getElementById('spell-input');
        input.value += char;
        btn.disabled = true;
    }

    function checkSpelling() {
        const input = document.getElementById('spell-input');
        const user = input.value.trim().toLowerCase();
        const correct = practiceList[curIdx].Answer.toLowerCase();
        
        if (user === '') {
            playCurrentWord();
            input.focus();
            return;
        }

        if (user === correct) {
            input.disabled = true;
            input.className = 'spell-input correct';
            document.getElementById('letter-pool').style.display = 'none';
            document.getElementById('hint-btn').style.display = 'none';
            document.getElementById('sub-btn').style.display = 'none'; 
            document.getElementById('next-btn').style.display = 'flex';
            
            if (!practiceList[curIdx].isWrong) totalCorrectCount++;
            
            // 播放成功音效（可替换为专门的音效，这里用语音代替欢呼）
            let u = new SpeechSynthesisUtterance("Excellent");
            u.voice = englishVoice; u.rate = 1.2;
            synth.speak(u);
            
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
            
            // 如果是最后一题，变按钮文案
            if (curIdx === practiceList.length - 1) {
                document.getElementById('next-btn').innerText = "Finish ✨";
            }
        } else {
            sessionErrors++;
            practiceList[curIdx].isWrong = true;
            
            input.classList.add('error-shake');
            setTimeout(() => {
                input.classList.remove('error-shake');
                input.value = '';
                input.focus();
                
                // 输错后自动弹出字母提示
                if (document.getElementById('hint-btn').style.display !== 'none') {
                    showScrambledHint();
                } else {
                    // 如果提示已开，重置键盘
                    showScrambledHint();
                }
            }, 400);
        }
    }

    function nextQuestion() { 
        if(curIdx < practiceList.length - 1) { 
            curIdx++; renderQuestion(); 
        } else { 
            finishQuiz(); 
        } 
    }

    function finishQuiz() {
        currentWrongItems = practiceList.filter(q => q.isWrong);
        
        let canPlay = (sessionErrors <= 2) && !isRetrySession; // 给点容错率

        if (currentWrongItems.length === 0) {
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.5 } });
            if (canPlay) setTimeout(() => { window.location.href = "https://andydang2007.github.io/game/popballoons.html?ticket=" + Date.now(); }, 3000);
        }
        
        let html = `<div style="padding:40px 0;"><h1 style="font-size:80px; margin:0;">${currentWrongItems.length===0?'🏆':'👍'}</h1><h2 style="font-size:36px; font-weight:900; color:#0f172a; margin-top:10px;">Well Done!</h2><p style="font-size:22px; font-weight:800; color:#64748b;">You spelled <span style="color:#10b981; font-size:40px;">${totalCorrectCount}</span> words correctly!</p>`;
        
        if (currentWrongItems.length > 0) {
            html += `<div style="margin-top:30px; background:#fffbeb; padding:25px 15px; border-radius:30px; border:4px dashed #fcd34d;"><h3 style="font-size:22px; font-weight:900; color:#d97706; margin-top:0;">Words to practice:</h3><div class="checkbox-grid" id="wrong-list">`;
            currentWrongItems.forEach((q, idx) => { 
                html += `<div class="topic-cb selected" data-idx="${idx}" onclick="this.classList.toggle('selected')">${q.Answer}</div>`; 
            });
            html += `</div><button class="btn-stacked" style="width:250px; margin:10px auto 0; padding:15px; background:#f59e0b; box-shadow: 0 6px 0 #d97706;" onclick="startRetry()">Try Again 🚀</button></div>`;
        }
        
        html += `<div class="action-panel" style="justify-content:center; margin-top:40px;"><button class="btn-square" style="flex:none; width:250px; padding:15px;" onclick="window.location.href='index.html'"><span style="font-size:24px;">🏠 Back to Hub</span></button></div></div>`;
        
        document.getElementById('finish-screen').innerHTML = html; 
        showScreen('finish-screen');
    }

    function startRetry() {
        let selElements = Array.from(document.querySelectorAll('#wrong-list .topic-cb.selected'));
        if (selElements.length === 0) return;
        
        isRetrySession = true; 
        practiceList = selElements.map(el => currentWrongItems[parseInt(el.dataset.idx)]);
        practiceList.forEach(q => q.isWrong = false);
        
        curIdx = 0; totalCorrectCount = 0; sessionErrors = 0;
        showScreen('practice-screen'); 
        renderQuestion();
    }

    function showScreen(id) { 
        document.querySelectorAll('.screen').forEach(s => s.style.display='none'); 
        document.getElementById(id).style.display='flex'; 
    }

    // 回车键提交
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('practice-screen').style.display === 'flex') {
                if (document.getElementById('sub-btn').style.display !== 'none') checkSpelling();
                else if (document.getElementById('next-btn').style.display !== 'none') nextQuestion();
            }
        }
    });

    window.onload = function() { 
        if(document.getElementById('loading').style.display !== 'none'){ init(); } 
    };
</script>

</body>
</html>
